<svg xmlns="http://www.w3.org/2000/svg" width="420" height="236" viewBox="0 0 420 236" role="img" aria-labelledby="title desc">
  <title id="title">Language composition</title>
  <desc id="desc">Language composition across owned GitHub repositories.</desc>
  <style>
    .sans {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }
    .serif {
      font-family: Georgia, 'Times New Roman', serif;
    }
    .eyebrow {
      fill: #8FB4FF;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .title {
      fill: #ECF2FF;
      font-size: 24px;
      font-weight: 700;
    }
    .subtitle {
      fill: #9DA9BF;
      font-size: 12px;
    }
    .panel {
      fill: #151E2D;
      stroke: #2C3A52;
    }
    .panel-soft {
      fill: #1B2638;
      stroke: #2C3A52;
    }
    .panel-title {
      fill: #ECF2FF;
      font-size: 16px;
      font-weight: 700;
    }
    .label {
      fill: #9DA9BF;
      font-size: 10px;
