      font-size: 10px;
    }
  </style>
  <rect width="420" height="236" rx="24" fill="#0F1623" />
  <rect x="1" y="1" width="418" height="234" rx="23" fill="none" stroke="#2C3A52" />
  <line x1="28" y1="80" x2="392" y2="80" stroke="#2C3A52" />
  <text x="28" y="36" class="eyebrow sans">STACK</text><text x="28" y="62" class="title serif">Language Composition</text><text x="28" y="100" class="subtitle sans">Fallback view based on primary repository languages</text><text x="28" y="118" class="note sans">Current public footprint is compact, so this mix is intentionally sparse.</text>
            <circle cx="32" cy="142" r="5" fill="#8FB4FF" />
            <text x="46" y="146" fill="#ECF2FF" font-size="12" font-weight="600" class="sans">README</text>
            <rect x="156" y="135" width="176" height="10" rx="5" fill="#1B2638" />
            <rect x="156" y="135" width="176" height="10" rx="5" fill="#8FB4FF" />
